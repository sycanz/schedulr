name: CI

on:
  pull_request:
    branches: [main, stg]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"

jobs:
  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: secret-detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install
          cd backend/cloudflare-workers && npm install

      - name: Set environment suffix
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "ENV_SUFFIX=prd" >> $GITHUB_ENV
          else
            echo "ENV_SUFFIX=stg" >> $GITHUB_ENV
          fi

      - name: Build frontend (stg)
        if: env.ENV_SUFFIX == 'stg'
        run: npm run build:scraper:stg
        env:
          CLIENT_ID_STG: ${{ secrets.CLIENT_ID_STG }}
          CFW_AUTH_ENDPOINT_STG: ${{ secrets.CFW_AUTH_ENDPOINT_STG }}
          CFW_REFRESH_ENDPOINT_STG: ${{ secrets.CFW_REFRESH_ENDPOINT_STG }}
          CFW_CHECK_RETURN_USER_ENDPOINT_STG: ${{ secrets.CFW_CHECK_RETURN_USER_ENDPOINT_STG }}
          CFW_GET_CALENDAR_ENDPOINT_STG: ${{ secrets.CFW_GET_CALENDAR_ENDPOINT_STG }}
          CFW_ADD_NEW_EVENT_ENDPOINT_STG: ${{ secrets.CFW_ADD_NEW_EVENT_ENDPOINT_STG }}

      - name: Build frontend (prd)
        if: env.ENV_SUFFIX == 'prd'
        run: npm run build:scraper:prd
        env:
          CLIENT_ID_PROD: ${{ secrets.CLIENT_ID_PROD }}
          CFW_AUTH_ENDPOINT_PROD: ${{ secrets.CFW_AUTH_ENDPOINT_PROD }}
          CFW_REFRESH_ENDPOINT_PROD: ${{ secrets.CFW_REFRESH_ENDPOINT_PROD }}
          CFW_CHECK_RETURN_USER_ENDPOINT_PROD: ${{ secrets.CFW_CHECK_RETURN_USER_ENDPOINT_PROD }}
          CFW_GET_CALENDAR_ENDPOINT_PROD: ${{ secrets.CFW_GET_CALENDAR_ENDPOINT_PROD }}
          CFW_ADD_NEW_EVENT_ENDPOINT_PROD: ${{ secrets.CFW_ADD_NEW_EVENT_ENDPOINT_PROD }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create extension manifest (chrome)
        run: |
          jq '.host_permissions |= map(select(. != "http://localhost:8787/*")) | .key = "${{ secrets.EXTENSION_PUBLIC_KEY }}"' manifest.json > manifest.prod.json
          mv manifest.prod.json manifest.json

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedulr-chrome-${{ env.ENV_SUFFIX }}
          path: |
            frontend/dist/
            frontend/src/
            images/
            manifest.json
          retention-days: 2

      - name: Create extension manifest (firefox)
        run: |
          jq '
            .host_permissions |= map(select(. != "http://localhost:8787/*"))
          ' manifest.firefox.json > manifest.firefox.prod.json
          mv manifest.firefox.prod.json manifest.json

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedulr-firefox-${{ env.ENV_SUFFIX }}
          path: |
            frontend/dist/
            frontend/src/
            images/
            manifest.json
          retention-days: 2

      - name: Upload worker build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worker-build
          path: backend/cloudflare-workers/dist/
          retention-days: 1
