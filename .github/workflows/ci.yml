name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main, stg]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "TROUBLESHOOTING.md"
      - "QUICKSTART.md"
  push:
    branches: [main, stg]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "TROUBLESHOOTING.md"
      - "QUICKSTART.md"

jobs:
  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: secret-detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend/cloudflare-workers && npm install

      - name: Build frontend (stg)
        if: ${{ github.ref == 'refs/heads/stg' || github.base_ref == 'stg' }}
        run: npm run build:scraper:stg
        env:
          CLIENT_ID_PROD: ${{ secrets.CLIENT_ID_STG }}
          CFW_AUTH_ENDPOINT_PROD: ${{ secrets.CFW_AUTH_ENDPOINT_STG }}
          CFW_REFRESH_ENDPOINT_PROD: ${{ secrets.CFW_REFRESH_ENDPOINT_STG }}
          CFW_CHECK_RETURN_USER_ENDPOINT_PROD: ${{ secrets.CFW_CHECK_RETURN_USER_ENDPOINT_STG }}
          CFW_GET_CALENDAR_ENDPOINT_PROD: ${{ secrets.CFW_GET_CALENDAR_ENDPOINT_STG }}
          CFW_ADD_NEW_EVENT_ENDPOINT_PROD: ${{ secrets.CFW_ADD_NEW_EVENT_ENDPOINT_STG }}

      - name: Build frontend (prd)
        if: ${{ github.ref == 'refs/heads/main' || github.base_ref == 'main' }}
        run: npm run build:scraper:prd
        env:
          CLIENT_ID_PROD: ${{ secrets.CLIENT_ID_PROD }}
          CFW_AUTH_ENDPOINT_PROD: ${{ secrets.CFW_AUTH_ENDPOINT_PROD }}
          CFW_REFRESH_ENDPOINT_PROD: ${{ secrets.CFW_REFRESH_ENDPOINT_PROD }}
          CFW_CHECK_RETURN_USER_ENDPOINT_PROD: ${{ secrets.CFW_CHECK_RETURN_USER_ENDPOINT_PROD }}
          CFW_GET_CALENDAR_ENDPOINT_PROD: ${{ secrets.CFW_GET_CALENDAR_ENDPOINT_PROD }}
          CFW_ADD_NEW_EVENT_ENDPOINT_PROD: ${{ secrets.CFW_ADD_NEW_EVENT_ENDPOINT_PROD }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create chrome production manifest
        run: |
          jq '.host_permissions |= map(select(. != "http://localhost:8787/*")) | .key = "${{ secrets.EXTENSION_PUBLIC_KEY }}"' manifest.json > manifest.prod.json
          mv manifest.prod.json manifest.json

      - name: Create firefox production manifest
        run: |
          jq '
            .host_permissions |= map(select(. != "http://localhost:8787/*")) |
            .background = { "scripts": [.background.service_worker], "type": .background.type }
          ' manifest.firefox.json > manifest.firefox.prod.json
          mv manifest.firefox.prod.json manifest.firefox.json

      - name: Upload extension build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: |
            frontend/dist/
            frontend/src/
            images/
            manifest.json
            manifest.firefox.json
          retention-days: 1

      - name: Upload worker build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worker-build
          path: backend/cloudflare-workers/dist/
          retention-days: 1
